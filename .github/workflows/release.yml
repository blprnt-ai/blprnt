name: Release

on:
  push:
    tags:
      - "v*.*.*"

permissions:
  contents: write

concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: false

env:
  CARGO_TERM_COLOR: always
  CARGO_NET_GIT_FETCH_WITH_CLI: true
  RUST_TOOLCHAIN: 1.90.0
  TAURI_CLI_VERSION: 2.9.5
  RUSTC_WRAPPER: sccache
  SCCACHE_GHA_ENABLED: "true"

jobs:
  prepare:
    name: Prepare release
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Validate semantic version tag
        shell: bash
        run: |
          set -euo pipefail
          TAG="${GITHUB_REF_NAME}"
          if [[ ! "$TAG" =~ ^v[0-9]+\.[0-9]+\.[0-9]+$ ]]; then
            echo "Ref '$TAG' is not a release tag in the form vMAJOR.MINOR.PATCH"
            exit 1
          fi

      - name: Validate tag matches app version
        shell: bash
        run: |
          set -euo pipefail
          TAG_VERSION="${GITHUB_REF_NAME#v}"
          APP_VERSION="$(python3 -c 'import json; print(json.load(open("tauri-src/tauri.conf.json"))["version"])')"
          if [[ "$TAG_VERSION" != "$APP_VERSION" ]]; then
            echo "Tag version '$TAG_VERSION' does not match tauri-src/tauri.conf.json version '$APP_VERSION'"
            exit 1
          fi

      - name: Create GitHub release if missing
        env:
          GH_TOKEN: ${{ github.token }}
        shell: bash
        run: |
          set -euo pipefail
          if ! gh release view "$GITHUB_REF_NAME" >/dev/null 2>&1; then
            gh release create "$GITHUB_REF_NAME" \
              --title "$GITHUB_REF_NAME" \
              --notes ""
          fi

  build-linux:
    name: Build Linux
    needs: prepare
    runs-on: ubuntu-22.04
    env:
      GH_TOKEN: ${{ github.token }}
      TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
      TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}
    steps:
      - uses: actions/checkout@v6

      - name: Trust github.com for Cargo git fetches
        shell: bash
        run: |
          set -euo pipefail
          mkdir -p ~/.ssh
          ssh-keyscan github.com >> ~/.ssh/known_hosts

      - name: Set up pnpm
        uses: pnpm/action-setup@v4
        with:
          run_install: false

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - name: Set up Rust toolchain
        uses: dtolnay/rust-toolchain@master
        with:
          toolchain: ${{ env.RUST_TOOLCHAIN }}
          targets: x86_64-unknown-linux-gnu

      - name: Cache Cargo install artifacts
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/bin
            ~/.cargo/registry
            ~/.cargo/git
          key: ${{ runner.os }}-cargo-tauri-cli-${{ env.RUST_TOOLCHAIN }}-${{ env.TAURI_CLI_VERSION }}

      - name: Set up sccache
        uses: mozilla-actions/sccache-action@v0.0.9

      - name: Verify sccache setup
        shell: bash
        run: |
          set -euo pipefail
          which sccache
          sccache --version
          sccache --show-stats

      - name: Install Linux system dependencies
        shell: bash
        run: |
          set -euo pipefail
          sudo apt-get update
          sudo apt-get install -y \
            build-essential \
            g++ \
            libfuse2 \
            libwebkit2gtk-4.1-dev \
            libayatana-appindicator3-dev \
            librsvg2-dev \
            patchelf \
            librsvg2-common \
            file \
            curl \
            xdg-utils \
            libclang-dev \
            lld \
            clang \
            zsync

      - name: Install Tauri CLI
        shell: bash
        run: |
          set -euo pipefail
          cargo install --git https://github.com/tauri-apps/tauri --branch feat/truly-portable-appimage tauri-cli --force

      - name: Install frontend dependencies
        shell: bash
        run: pnpm install --frozen-lockfile

      - name: Build frontend
        shell: bash
        run: pnpm build

      - name: Download bundled external binaries
        shell: bash
        run: |
          set -euo pipefail
          ./scripts/download-ripgrep.sh
          ./scripts/download-surreal.sh
          ./scripts/download-bun.sh

      - name: Resolve Cargo dependencies
        shell: bash
        run: cargo fetch

      - name: Show sccache stats before Rust build
        shell: bash
        run: sccache --show-stats

      - name: Build Linux release bundles
        shell: bash
        run: cargo tauri build --target x86_64-unknown-linux-gnu --bundles deb,rpm,appimage --verbose

      - name: Show sccache stats after Rust build
        shell: bash
        run: sccache --show-stats

      - name: Release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            target/x86_64-unknown-linux-gnu/release/bundle/deb/*.deb
            target/x86_64-unknown-linux-gnu/release/bundle/rpm/*.rpm
            target/x86_64-unknown-linux-gnu/release/bundle/appimage/*.AppImage
            target/x86_64-unknown-linux-gnu/release/bundle/appimage/*.AppImage.sig

  build-windows:
    name: Build Windows
    needs: prepare
    runs-on: windows-2022
    env:
      GH_TOKEN: ${{ github.token }}
      LIBCLANG_PATH: C:\Program Files\LLVM\bin
      TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
      TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}
    steps:
      - uses: actions/checkout@v6

      - name: Trust github.com for Cargo git fetches
        shell: bash
        run: |
          set -euo pipefail
          mkdir -p ~/.ssh
          ssh-keyscan github.com >> ~/.ssh/known_hosts

      - name: Set up pnpm
        uses: pnpm/action-setup@v4
        with:
          run_install: false

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - name: Set up Rust toolchain
        uses: dtolnay/rust-toolchain@master
        with:
          toolchain: ${{ env.RUST_TOOLCHAIN }}
          targets: x86_64-pc-windows-msvc

      - name: Cache Cargo install artifacts
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/bin
            ~/.cargo/registry
            ~/.cargo/git
          key: ${{ runner.os }}-cargo-tauri-cli-${{ env.RUST_TOOLCHAIN }}-${{ env.TAURI_CLI_VERSION }}

      - name: Set up sccache
        uses: mozilla-actions/sccache-action@v0.0.9

      - name: Verify sccache setup
        shell: bash
        run: |
          set -euo pipefail
          which sccache
          sccache --version
          sccache --show-stats

      - name: Install Tauri CLI
        shell: bash
        run: |
          set -euo pipefail
          if ! command -v cargo-tauri >/dev/null 2>&1 || ! cargo-tauri --version | grep -q "$TAURI_CLI_VERSION"; then
            cargo install tauri-cli --version "$TAURI_CLI_VERSION" --locked --force
          fi

      - name: Install frontend dependencies
        shell: bash
        run: pnpm install --frozen-lockfile

      - name: Build frontend
        shell: bash
        run: pnpm build

      - name: Download bundled external binaries
        shell: bash
        run: |
          set -euo pipefail
          ./scripts/download-ripgrep.sh
          ./scripts/download-surreal.sh
          ./scripts/download-bun.sh

      - name: Resolve Cargo dependencies
        shell: bash
        run: cargo fetch

      - name: Show sccache stats before Rust build
        shell: bash
        run: sccache --show-stats

      - name: Build Windows release bundle
        shell: bash
        run: cargo tauri build --target x86_64-pc-windows-msvc --bundles nsis

      - name: Show sccache stats after Rust build
        shell: bash
        run: sccache --show-stats

      - name: Upload Windows release assets
        uses: softprops/action-gh-release@v2
        with:
          files: |
            target/x86_64-pc-windows-msvc/release/bundle/nsis/*.exe
            target/x86_64-pc-windows-msvc/release/bundle/nsis/*.sig

  build-macos:
    name: Build macOS
    needs: prepare
    runs-on: macos-14
    env:
      GH_TOKEN: ${{ github.token }}
      TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
      TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}
    steps:
      - uses: actions/checkout@v6

      - name: Trust github.com for Cargo git fetches
        shell: bash
        run: |
          set -euo pipefail
          mkdir -p ~/.ssh
          ssh-keyscan github.com >> ~/.ssh/known_hosts

      - name: Set up pnpm
        uses: pnpm/action-setup@v4
        with:
          run_install: false

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - name: Set up Rust toolchain
        uses: dtolnay/rust-toolchain@master
        with:
          toolchain: ${{ env.RUST_TOOLCHAIN }}
          targets: aarch64-apple-darwin

      - name: Cache Cargo install artifacts
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/bin
            ~/.cargo/registry
            ~/.cargo/git
          key: ${{ runner.os }}-cargo-tauri-cli-${{ env.RUST_TOOLCHAIN }}-${{ env.TAURI_CLI_VERSION }}

      - name: Set up sccache
        uses: mozilla-actions/sccache-action@v0.0.9

      - name: Verify sccache setup
        shell: bash
        run: |
          set -euo pipefail
          which sccache
          sccache --version
          sccache --show-stats

      - name: Install Tauri CLI
        shell: bash
        run: |
          set -euo pipefail
          if ! command -v cargo-tauri >/dev/null 2>&1 || ! cargo-tauri --version | grep -q "$TAURI_CLI_VERSION"; then
            cargo install tauri-cli --version "$TAURI_CLI_VERSION" --locked --force
          fi

      - name: Install frontend dependencies
        shell: bash
        run: pnpm install --frozen-lockfile

      - name: Build frontend
        shell: bash
        run: pnpm build

      - name: Download bundled external binaries
        shell: bash
        run: |
          set -euo pipefail
          ./scripts/download-ripgrep.sh
          ./scripts/download-surreal.sh
          ./scripts/download-bun.sh

      - name: Resolve Cargo dependencies
        shell: bash
        run: cargo fetch

      - name: Show sccache stats before Rust build
        shell: bash
        run: sccache --show-stats

      - name: Build macOS app bundle
        shell: bash
        run: |
          set -euo pipefail
          cargo tauri build --no-bundle
          cargo tauri bundle --bundles app,dmg

      - name: Show sccache stats after Rust build
        shell: bash
        run: sccache --show-stats

      - name: Release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            target/release/bundle/macos/*.app
            target/release/bundle/macos/*.app.tar.gz
            target/release/bundle/macos/*.app.tar.gz.sig
            target/release/bundle/dmg/*.dmg

  publish-manifest:
    name: Publish canonical latest.json
    needs:
      - build-linux
      - build-windows
      - build-macos
    runs-on: ubuntu-latest
    env:
      GH_TOKEN: ${{ github.token }}
    steps:
      - uses: actions/checkout@v6

      - name: Generate canonical latest.json
        shell: bash
        run: |
          set -euo pipefail
          ./scripts/release.sh "$GITHUB_REF_NAME" latest.json

      - name: Upload canonical latest.json asset
        shell: bash
        run: |
          set -euo pipefail
          gh release upload "$GITHUB_REF_NAME" latest.json --clobber