name: Release

on:
  push:
    tags:
      - "v*.*.*"

permissions:
  contents: write

concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: false

env:
  CARGO_TERM_COLOR: always
  CARGO_NET_GIT_FETCH_WITH_CLI: true
  RUST_TOOLCHAIN: 1.90.0
  RUSTC_WRAPPER: sccache

jobs:
  prepare:
    name: Prepare release
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Validate semantic version tag
        shell: bash
        run: |
          set -euo pipefail
          TAG="${GITHUB_REF_NAME}"
          SEMVER_PATTERN='^v(0|[1-9][0-9]*)\.(0|[1-9][0-9]*)\.(0|[1-9][0-9]*)(-([0-9A-Za-z-]+(\.[0-9A-Za-z-]+)*))?(\+([0-9A-Za-z-]+(\.[0-9A-Za-z-]+)*))?$'
          if [[ ! "$TAG" =~ $SEMVER_PATTERN ]]; then
            echo "Ref '$TAG' is not a valid release tag in the form vMAJOR.MINOR.PATCH, optionally with prerelease/build metadata"
            exit 1
          fi

      - name: Validate tag matches blprnt crate version
        shell: bash
        run: |
          set -euo pipefail
          TAG_VERSION="${GITHUB_REF_NAME#v}"
          APP_VERSION="$(sed -nE 's/^version[[:space:]]*=[[:space:]]*"([^"]+)"/\1/p' backend/crates/blprnt/Cargo.toml | head -n1)"
          if [[ -z "$APP_VERSION" ]]; then
            echo "missing version in backend/crates/blprnt/Cargo.toml"
            exit 1
          fi
          if [[ "$TAG_VERSION" != "$APP_VERSION" ]]; then
            echo "Tag version '$TAG_VERSION' does not match backend/crates/blprnt/Cargo.toml version '$APP_VERSION'"
            exit 1
          fi

      - name: Verify release automation matches the live repo
        shell: bash
        run: ./scripts/check-release-alignment.sh

      - name: Create GitHub release if missing
        if: ${{ !env.ACT }}
        env:
          GH_TOKEN: ${{ github.token }}
        shell: bash
        run: |
          set -euo pipefail
          if ! gh release view "$GITHUB_REF_NAME" >/dev/null 2>&1; then
            gh release create "$GITHUB_REF_NAME" \
              --title "$GITHUB_REF_NAME" \
              --notes ""
          fi

  build-linux:
    name: Build Linux archive
    needs: prepare
    runs-on: ubuntu-22.04
    env:
      GH_TOKEN: ${{ github.token }}
      RELEASE_VERSION: ${{ github.ref_name }}
      TARGET_TRIPLE: x86_64-unknown-linux-gnu
      RELEASE_STEM: blprnt-${{ github.ref_name }}-linux-x86_64
    steps:
      - uses: actions/checkout@v6

      - name: Trust github.com for Cargo git fetches
        shell: bash
        run: |
          set -euo pipefail
          mkdir -p ~/.ssh
          ssh-keyscan github.com >> ~/.ssh/known_hosts

      - name: Install Linux system dependencies
        shell: bash
        run: |
          set -euo pipefail
          sudo apt-get update
          sudo apt-get install -y \
            build-essential \
            clang \
            libclang-dev \
            lld \
            pkg-config

      - name: Set up pnpm
        uses: pnpm/action-setup@v4
        with:
          run_install: false

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - name: Set up Rust toolchain
        uses: dtolnay/rust-toolchain@master
        with:
          toolchain: ${{ env.RUST_TOOLCHAIN }}
          targets: ${{ env.TARGET_TRIPLE }}

      - name: Set up sccache
        uses: mozilla-actions/sccache-action@v0.0.9

      - name: Install frontend dependencies
        shell: bash
        run: pnpm --dir frontend install --frozen-lockfile

      - name: Build static assets
        shell: bash
        run: pnpm --dir frontend build

      - name: Resolve Cargo dependencies
        shell: bash
        run: cargo fetch --locked --manifest-path backend/Cargo.toml

      - name: Build blprnt release binary
        shell: bash
        run: cargo build --release --locked --manifest-path backend/Cargo.toml -p blprnt --target "$TARGET_TRIPLE"

      - name: Package Linux archive
        shell: bash
        run: |
          set -euo pipefail
          package_dir="release/$RELEASE_STEM"
          mkdir -p "$package_dir"
          cp "backend/target/$TARGET_TRIPLE/release/blprnt" "$package_dir/blprnt"
          cp -R frontend/dist "$package_dir/dist"
          ./scripts/fetch-ripgrep.sh "$TARGET_TRIPLE" "$package_dir/tools/rg"
          cp README.md LICENSE "$package_dir/"
          tar -C release -czf "release/$RELEASE_STEM.tar.gz" "$RELEASE_STEM"

      - name: Upload Linux release asset
        uses: softprops/action-gh-release@v2
        with:
          files: release/*.tar.gz

      - name: Stage Linux npm package
        shell: bash
        run: bash ./scripts/stage-npm-binary.sh "$TARGET_TRIPLE" "backend/target/$TARGET_TRIPLE/release/blprnt"

      - name: Stage wrapper npm package
        shell: bash
        run: |
          set -euo pipefail
          rm -rf npm/blprnt/dist
          cp -R frontend/dist npm/blprnt/dist

      - name: Upload wrapper npm package artifact
        uses: actions/upload-artifact@v4
        with:
          name: wrapper-npm-package
          path: npm/blprnt
          if-no-files-found: error

      - name: Upload Linux npm package artifact
        uses: actions/upload-artifact@v4
        with:
          name: linux-npm-package
          path: npm/linux-x64
          if-no-files-found: error

  build-windows:
    name: Build Windows archive
    needs: prepare
    runs-on: windows-2022
    env:
      GH_TOKEN: ${{ github.token }}
      LIBCLANG_PATH: C:\Program Files\LLVM\bin
      RELEASE_VERSION: ${{ github.ref_name }}
      TARGET_TRIPLE: x86_64-pc-windows-msvc
      RELEASE_STEM: blprnt-${{ github.ref_name }}-windows-x86_64
    steps:
      - uses: actions/checkout@v6

      - name: Trust github.com for Cargo git fetches
        shell: bash
        run: |
          set -euo pipefail
          mkdir -p ~/.ssh
          ssh-keyscan github.com >> ~/.ssh/known_hosts

      - name: Set up pnpm
        uses: pnpm/action-setup@v4
        with:
          run_install: false

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - name: Set up Rust toolchain
        uses: dtolnay/rust-toolchain@master
        with:
          toolchain: ${{ env.RUST_TOOLCHAIN }}
          targets: ${{ env.TARGET_TRIPLE }}

      - name: Set up sccache
        uses: mozilla-actions/sccache-action@v0.0.9

      - name: Install frontend dependencies
        shell: bash
        run: pnpm --dir frontend install --frozen-lockfile

      - name: Build static assets
        shell: bash
        run: pnpm --dir frontend build

      - name: Resolve Cargo dependencies
        shell: bash
        run: cargo fetch --locked --manifest-path backend/Cargo.toml

      - name: Build blprnt release binary
        shell: bash
        run: cargo build --release --locked --manifest-path backend/Cargo.toml -p blprnt --target "$TARGET_TRIPLE"

      - name: Package Windows archive
        shell: pwsh
        run: |
          $packageDir = "release/$env:RELEASE_STEM"
          New-Item -ItemType Directory -Force -Path $packageDir | Out-Null
          Copy-Item "backend/target/$env:TARGET_TRIPLE/release/blprnt.exe" "$packageDir/blprnt.exe"
          Copy-Item "frontend/dist" "$packageDir/dist" -Recurse
          & "$pwd/scripts/fetch-ripgrep.ps1" -OutputPath "$packageDir/tools/rg.exe"
          Copy-Item "README.md","LICENSE" $packageDir
          Compress-Archive -Path "$packageDir/*" -DestinationPath "release/$env:RELEASE_STEM.zip" -Force

      - name: Upload Windows release asset
        uses: softprops/action-gh-release@v2
        with:
          files: release/*.zip

      - name: Stage Windows npm package
        shell: bash
        run: bash ./scripts/stage-npm-binary.sh "$TARGET_TRIPLE" "backend/target/$TARGET_TRIPLE/release/blprnt.exe"

      - name: Upload Windows npm package artifact
        uses: actions/upload-artifact@v4
        with:
          name: windows-npm-package
          path: npm/win32-x64
          if-no-files-found: error

  build-macos:
    name: Build macOS archive
    needs: prepare
    runs-on: macos-14
    env:
      GH_TOKEN: ${{ github.token }}
      RELEASE_VERSION: ${{ github.ref_name }}
      TARGET_TRIPLE: aarch64-apple-darwin
      RELEASE_STEM: blprnt-${{ github.ref_name }}-macos-aarch64
    steps:
      - uses: actions/checkout@v6

      - name: Trust github.com for Cargo git fetches
        shell: bash
        run: |
          set -euo pipefail
          mkdir -p ~/.ssh
          ssh-keyscan github.com >> ~/.ssh/known_hosts

      - name: Set up pnpm
        uses: pnpm/action-setup@v4
        with:
          run_install: false

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - name: Set up Rust toolchain
        uses: dtolnay/rust-toolchain@master
        with:
          toolchain: ${{ env.RUST_TOOLCHAIN }}
          targets: ${{ env.TARGET_TRIPLE }}

      - name: Set up sccache
        uses: mozilla-actions/sccache-action@v0.0.9

      - name: Install frontend dependencies
        shell: bash
        run: pnpm --dir frontend install --frozen-lockfile

      - name: Build static assets
        shell: bash
        run: pnpm --dir frontend build

      - name: Resolve Cargo dependencies
        shell: bash
        run: cargo fetch --locked --manifest-path backend/Cargo.toml

      - name: Build blprnt release binary
        shell: bash
        run: cargo build --release --locked --manifest-path backend/Cargo.toml -p blprnt --target "$TARGET_TRIPLE"

      - name: Package macOS archive
        shell: bash
        run: |
          set -euo pipefail
          package_dir="release/$RELEASE_STEM"
          mkdir -p "$package_dir"
          cp "backend/target/$TARGET_TRIPLE/release/blprnt" "$package_dir/blprnt"
          cp -R frontend/dist "$package_dir/dist"
          ./scripts/fetch-ripgrep.sh "$TARGET_TRIPLE" "$package_dir/tools/rg"
          cp README.md LICENSE "$package_dir/"
          tar -C release -czf "release/$RELEASE_STEM.tar.gz" "$RELEASE_STEM"

      - name: Upload macOS release asset
        uses: softprops/action-gh-release@v2
        with:
          files: release/*.tar.gz

      - name: Stage macOS npm package
        shell: bash
        run: bash ./scripts/stage-npm-binary.sh "$TARGET_TRIPLE" "backend/target/$TARGET_TRIPLE/release/blprnt"

      - name: Upload macOS npm package artifact
        uses: actions/upload-artifact@v4
        with:
          name: macos-npm-package
          path: npm/darwin-arm64
          if-no-files-found: error

  npm-publish:
    name: Publish npm packages
    needs:
      - build-linux
      - build-windows
      - build-macos
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Set up pnpm
        uses: pnpm/action-setup@v4
        with:
          run_install: false

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          registry-url: https://registry.npmjs.org

      - name: Download Linux npm package artifact
        uses: actions/download-artifact@v4
        with:
          name: linux-npm-package
          path: npm/linux-x64

      - name: Download Windows npm package artifact
        uses: actions/download-artifact@v4
        with:
          name: windows-npm-package
          path: npm/win32-x64

      - name: Download macOS npm package artifact
        uses: actions/download-artifact@v4
        with:
          name: macos-npm-package
          path: npm/darwin-arm64

      - name: Download wrapper npm package artifact
        uses: actions/download-artifact@v4
        with:
          name: wrapper-npm-package
          path: npm/blprnt

      - name: Restore Unix executable permissions for npm packages
        shell: bash
        run: |
          set -euo pipefail
          chmod 755 npm/darwin-arm64/blprnt
          chmod 755 npm/darwin-arm64/tools/rg
          chmod 755 npm/linux-x64/blprnt
          chmod 755 npm/linux-x64/tools/rg

      - name: Verify npm package versions
        shell: bash
        run: pnpm check:version-sync

      - name: Publish platform packages
        shell: bash
        run: |
          set -euo pipefail
          npm publish ./npm/darwin-arm64 --access public
          npm publish ./npm/linux-x64 --access public
          npm publish ./npm/win32-x64 --access public
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}

      - name: Wait for npm propagation
        shell: bash
        run: sleep 15

      - name: Publish wrapper package
        shell: bash
        run: npm publish ./npm/blprnt --access public
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
