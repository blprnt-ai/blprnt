name: Release

on:
  push:
    tags:
      - "v*.*.*"

permissions:
  contents: write

concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: false

env:
  CARGO_TERM_COLOR: always
  CARGO_NET_GIT_FETCH_WITH_CLI: true
  RUST_TOOLCHAIN: 1.90.0
  RUSTC_WRAPPER: sccache

jobs:
  prepare:
    name: Prepare release
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Validate semantic version tag
        shell: bash
        run: |
          set -euo pipefail
          TAG="${GITHUB_REF_NAME}"
          if [[ ! "$TAG" =~ ^v[0-9]+\.[0-9]+\.[0-9]+$ ]]; then
            echo "Ref '$TAG' is not a release tag in the form vMAJOR.MINOR.PATCH"
            exit 1
          fi

      - name: Validate tag matches blprnt crate version
        shell: bash
        run: |
          set -euo pipefail
          TAG_VERSION="${GITHUB_REF_NAME#v}"
          APP_VERSION="$(
            python3 - <<'PY'
from pathlib import Path
import re

text = Path("crates/blprnt/Cargo.toml").read_text()
match = re.search(r'^version\s*=\s*"([^"]+)"', text, re.MULTILINE)
if not match:
    raise SystemExit("missing version in crates/blprnt/Cargo.toml")
print(match.group(1))
PY
          )"
          if [[ "$TAG_VERSION" != "$APP_VERSION" ]]; then
            echo "Tag version '$TAG_VERSION' does not match crates/blprnt/Cargo.toml version '$APP_VERSION'"
            exit 1
          fi

      - name: Verify release automation matches the live repo
        shell: bash
        run: ./scripts/check-release-alignment.sh

      - name: Create GitHub release if missing
        env:
          GH_TOKEN: ${{ github.token }}
        shell: bash
        run: |
          set -euo pipefail
          if ! gh release view "$GITHUB_REF_NAME" >/dev/null 2>&1; then
            gh release create "$GITHUB_REF_NAME" \
              --title "$GITHUB_REF_NAME" \
              --notes ""
          fi

  build-linux:
    name: Build Linux archive
    needs: prepare
    runs-on: ubuntu-22.04
    env:
      GH_TOKEN: ${{ github.token }}
      RELEASE_VERSION: ${{ github.ref_name }}
      TARGET_TRIPLE: x86_64-unknown-linux-gnu
      RELEASE_STEM: blprnt-${{ github.ref_name }}-linux-x86_64
    steps:
      - uses: actions/checkout@v6

      - name: Trust github.com for Cargo git fetches
        shell: bash
        run: |
          set -euo pipefail
          mkdir -p ~/.ssh
          ssh-keyscan github.com >> ~/.ssh/known_hosts

      - name: Install Linux system dependencies
        shell: bash
        run: |
          set -euo pipefail
          sudo apt-get update
          sudo apt-get install -y \
            build-essential \
            clang \
            libclang-dev \
            lld \
            pkg-config

      - name: Set up pnpm
        uses: pnpm/action-setup@v4
        with:
          run_install: false

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - name: Set up Rust toolchain
        uses: dtolnay/rust-toolchain@master
        with:
          toolchain: ${{ env.RUST_TOOLCHAIN }}
          targets: ${{ env.TARGET_TRIPLE }}

      - name: Set up sccache
        uses: mozilla-actions/sccache-action@v0.0.9

      - name: Install frontend dependencies
        shell: bash
        run: pnpm install --frozen-lockfile

      - name: Build static assets
        shell: bash
        run: pnpm build

      - name: Resolve Cargo dependencies
        shell: bash
        run: cargo fetch --locked

      - name: Build blprnt release binary
        shell: bash
        run: cargo build --release --locked -p blprnt --target "$TARGET_TRIPLE"

      - name: Package Linux archive
        shell: bash
        run: |
          set -euo pipefail
          package_dir="release/$RELEASE_STEM"
          mkdir -p "$package_dir"
          cp "target/$TARGET_TRIPLE/release/blprnt" "$package_dir/blprnt"
          cp -R dist "$package_dir/dist"
          ./scripts/fetch-ripgrep.sh "$TARGET_TRIPLE" "$package_dir/tools/rg"
          cp README.md LICENSE "$package_dir/"
          tar -C release -czf "release/$RELEASE_STEM.tar.gz" "$RELEASE_STEM"

      - name: Upload Linux release asset
        uses: softprops/action-gh-release@v2
        with:
          files: release/*.tar.gz

  build-windows:
    name: Build Windows archive
    needs: prepare
    runs-on: windows-2022
    env:
      GH_TOKEN: ${{ github.token }}
      LIBCLANG_PATH: C:\Program Files\LLVM\bin
      RELEASE_VERSION: ${{ github.ref_name }}
      TARGET_TRIPLE: x86_64-pc-windows-msvc
      RELEASE_STEM: blprnt-${{ github.ref_name }}-windows-x86_64
    steps:
      - uses: actions/checkout@v6

      - name: Trust github.com for Cargo git fetches
        shell: bash
        run: |
          set -euo pipefail
          mkdir -p ~/.ssh
          ssh-keyscan github.com >> ~/.ssh/known_hosts

      - name: Set up pnpm
        uses: pnpm/action-setup@v4
        with:
          run_install: false

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - name: Set up Rust toolchain
        uses: dtolnay/rust-toolchain@master
        with:
          toolchain: ${{ env.RUST_TOOLCHAIN }}
          targets: ${{ env.TARGET_TRIPLE }}

      - name: Set up sccache
        uses: mozilla-actions/sccache-action@v0.0.9

      - name: Install frontend dependencies
        shell: bash
        run: pnpm install --frozen-lockfile

      - name: Build static assets
        shell: bash
        run: pnpm build

      - name: Resolve Cargo dependencies
        shell: bash
        run: cargo fetch --locked

      - name: Build blprnt release binary
        shell: bash
        run: cargo build --release --locked -p blprnt --target "$TARGET_TRIPLE"

      - name: Package Windows archive
        shell: pwsh
        run: |
          $packageDir = "release/$env:RELEASE_STEM"
          New-Item -ItemType Directory -Force -Path $packageDir | Out-Null
          Copy-Item "target/$env:TARGET_TRIPLE/release/blprnt.exe" "$packageDir/blprnt.exe"
          Copy-Item "dist" "$packageDir/dist" -Recurse
          & "$pwd/scripts/fetch-ripgrep.ps1" -OutputPath "$packageDir/tools/rg.exe"
          Copy-Item "README.md","LICENSE" $packageDir
          Compress-Archive -Path "$packageDir/*" -DestinationPath "release/$env:RELEASE_STEM.zip" -Force

      - name: Upload Windows release asset
        uses: softprops/action-gh-release@v2
        with:
          files: release/*.zip

  build-macos:
    name: Build macOS archive
    needs: prepare
    runs-on: macos-14
    env:
      GH_TOKEN: ${{ github.token }}
      RELEASE_VERSION: ${{ github.ref_name }}
      TARGET_TRIPLE: aarch64-apple-darwin
      RELEASE_STEM: blprnt-${{ github.ref_name }}-macos-aarch64
    steps:
      - uses: actions/checkout@v6

      - name: Trust github.com for Cargo git fetches
        shell: bash
        run: |
          set -euo pipefail
          mkdir -p ~/.ssh
          ssh-keyscan github.com >> ~/.ssh/known_hosts

      - name: Set up pnpm
        uses: pnpm/action-setup@v4
        with:
          run_install: false

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - name: Set up Rust toolchain
        uses: dtolnay/rust-toolchain@master
        with:
          toolchain: ${{ env.RUST_TOOLCHAIN }}
          targets: ${{ env.TARGET_TRIPLE }}

      - name: Set up sccache
        uses: mozilla-actions/sccache-action@v0.0.9

      - name: Install frontend dependencies
        shell: bash
        run: pnpm install --frozen-lockfile

      - name: Build static assets
        shell: bash
        run: pnpm build

      - name: Resolve Cargo dependencies
        shell: bash
        run: cargo fetch --locked

      - name: Build blprnt release binary
        shell: bash
        run: cargo build --release --locked -p blprnt --target "$TARGET_TRIPLE"

      - name: Package macOS archive
        shell: bash
        run: |
          set -euo pipefail
          package_dir="release/$RELEASE_STEM"
          mkdir -p "$package_dir"
          cp "target/$TARGET_TRIPLE/release/blprnt" "$package_dir/blprnt"
          cp -R dist "$package_dir/dist"
          ./scripts/fetch-ripgrep.sh "$TARGET_TRIPLE" "$package_dir/tools/rg"
          cp README.md LICENSE "$package_dir/"
          tar -C release -czf "release/$RELEASE_STEM.tar.gz" "$RELEASE_STEM"

      - name: Upload macOS release asset
        uses: softprops/action-gh-release@v2
        with:
          files: release/*.tar.gz
