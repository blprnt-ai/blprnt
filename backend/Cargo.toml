surrealdb            = { version = "=3.0.5", features = ["kv-mem", "kv-rocksdb", "allocator"] }
surrealdb-types      = { version = "=3.0.5", features = ["arbitrary"] }
syn                  = { version = "2.0.117", features = ["full"] }
thiserror            = { version = "2.0.18" }
tokio                = { version = "1.50.0", default-features = false, features = ["io-util", "macros", "process", "rt-multi-thread", "sync", "test-util", "time", "signal"] }
tokio-util           = { version = "0.7.18" }
tower-http           = { version = "0.6.8", features = ["fs", "cors"] }
