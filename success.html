<html>
<style>
  html,
  body {
    background-color: oklch(0.21 0.034 264);
    font-family: Arial, sans-serif;
    font-size: 16px;
    line-height: 1.5;
    height: 100vh;
    width: 100vw;
  }

  .container {
    display: flex;
    align-items: center;
    justify-content: center;
    height: 100vh;
    width: 100vw;
  }

  .content {
    display: flex;
    background-color: oklch(0.21 0.034 264);
    flex-direction: column;
    align-items: center;
    border: 1px solid #0f92f7;
    justify-content: center;
    border-radius: 10px;
    padding: 1rem;
    transition: all 0.3s ease-in-out;
    transform-origin: center;
    transform: scale(0.98);
    will-change: transform, background-color, box-shadow;
  }

  .content:hover {
    background-color: oklch(0.19 0.034 264);
    transform: scale(1);
    box-shadow: 0 0 10px oklch(0.19 0.034 264);
  }

  .bg-grid {
    --tw-bg-opacity: 0.3;
    --grid-line: 15 146 247;
    /* 0f92f7 */

    background: radial-gradient(circle at center,
        rgb(0 0 0 / 0) 0%,
        #101828 90%) center/auto no-repeat,
      linear-gradient(to right,
        rgb(var(--grid-line) / var(--tw-bg-opacity)),
        transparent 1px) calc(50% - 20px) calc(50% - 20px) / 40px 40px,
      linear-gradient(to bottom,
        rgb(var(--grid-line) / var(--tw-bg-opacity)),
        transparent 1px) calc(50% - 20px) calc(50% - 20px) / 40px 40px;
  }

  h3 {
    color: #0f92f7;
    font-size: 2rem;
    font-weight: 700;
    margin: 0;
  }

  p {
    font-size: 1rem;
    font-weight: 400;
    color: #666;
  }
</style>

<body class="bg-grid">
  <div class="container">
    <div class="content">
      <h3>Authentication complete.</h3>
      <p>You may close this window.</p>
    </div>
  </div>
</body>

</html>
